<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>NITOGO</title>
    <meta name="description" content="テキストテキストテキストテキストテキストテキスト" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cardo:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css" />
    <link rel="stylesheet" href="css/style.css?v=1.0.12" />
  </head>

  <body>
    <header class="site-header">
      <div class="site-header__inner">
        <h1 class="site-header__logo">
          <a href="/" class="site-header__logo-link" aria-label="NITOGO トップページへ">
            <img src="images/top/nitogo_logo.png" alt="NITOGO" width="120" height="77" class="site-header__logo-img" />
          </a>
        </h1>

        <nav class="site-header__nav" aria-label="グローバルナビゲーション">
          <ul class="site-header__nav-list">
            <li class="site-header__nav-item">
              <a href="#products">PRODUCTS</a>
            </li>
            <li class="site-header__nav-item">
              <a href="#gallery">GALLERY</a>
            </li>
            <li class="site-header__nav-item">
              <a href="#about">ABOUT US</a>
            </li>
            <li class="site-header__nav-item">
              <a href="#news">NEWS</a>
            </li>
            <li class="site-header__nav-item">
              <a href="#contact">CONTACT</a>
            </li>
          </ul>
        </nav>

        <div class="site-header__sns">
          <a href="#" class="site-header__sns-link" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <img src="images/top/icon-instagram.png" alt="Instagram" width="44" height="44" class="site-header__sns-icon" />
          </a>
        </div>

        <button class="hamburger" type="button" aria-label="メニューを開く" aria-controls="mobile-menu" aria-expanded="false">
          <span></span>
          <span></span>
        </button>
      </div>
    </header>

    <div class="mobile-menu" id="mobile-menu" aria-hidden="true">
      <nav class="mobile-menu__nav" aria-label="スマートフォン用ナビゲーション">
        <ul class="mobile-menu__list">
          <li class="mobile-menu__item">
            <a href="#products">PRODUCTS</a>
          </li>

          <li class="mobile-menu__item">
            <a href="#gallery">GALLERY</a>
          </li>

          <li class="mobile-menu__item">
            <a href="#about">ABOUT US</a>
          </li>

          <li class="mobile-menu__item">
            <a href="#news">NEWS</a>
          </li>

          <li class="mobile-menu__item">
            <a href="#contact">CONTACT</a>
          </li>
        </ul>

        <div class="mobile-menu__sns">
          <a href="#" class="mobile-menu__sns-link" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <img src="images/top/icon-instagram.png" alt="Instagram" width="44" height="44" class="mobile-menu__sns-icon" />
          </a>
        </div>
      </nav>
    </div>

    <main>
      <section class="main-visual">
        <div class="main-visual__pc">
          <div class="swiper main-visual__slider">
            <div class="swiper-wrapper">
              <div class="swiper-slide main-visual__slide">
                <img src="images/top/main-visual01.jpg" alt="NITOGOの商品が並ぶナチュラルなインテリア空間" width="1920" height="710" class="main-visual__image" fetchpriority="high" />
              </div>

              <div class="swiper-slide main-visual__slide">
                <img src="images/top/main-visual02.jpg" alt="明るい光が差し込む上質なリビング空間" width="1440" height="1080" class="main-visual__image" />
              </div>

              <div class="swiper-slide main-visual__slide">
                <img src="images/top/main-visual03.jpg" alt="飾り棚とソファのある落ち着いたリビング空間" width="1440" height="1080" class="main-visual__image" />
              </div>

              <div class="swiper-slide main-visual__slide">
                <img src="images/top/main-visual04.jpg" alt="自然素材の家具とファブリックが調和する寝室" width="1536" height="768" class="main-visual__image" />
              </div>

              <div class="swiper-slide main-visual__slide">
                <img src="images/top/main-visual05.jpg" alt="ブラウンのソファとやわらかな照明があるリビング空間" width="1440" height="1080" class="main-visual__image" />
              </div>
            </div>
            <div class="main-visual__controls">
              <div class="swiper-button-prev main-visual__button main-visual__button--prev"></div>
              <div class="swiper-pagination main-visual__pagination"></div>
              <div class="swiper-button-next main-visual__button main-visual__button--next"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="concept">
        <div class="concept__inner inner">
          <h2 class="concept__title js-concept-title">We make both the super popular and the often overlooked.</h2>

          <p class="concept__text js-concept-text">
            定番も、見過ごされがちなものも。
            <br class="sp-only" />
            新しい古いにとらわれることなく、どちらも
            <br />
            大切にして、かたちにしています。
          </p>
        </div>
      </section>

      <section class="pickup" id="products">
        <div class="pickup__inner inner">
          <h2 class="section-title js-section-title">
            PICK UP
            <span class="section-title__line"></span>
          </h2>

          <ul class="pickup__list">
            <li class="pickup__item">
              <img src="images/top/pickup-rug01.jpg" alt="赤いヴィンテージラグ" width="700" height="700" loading="lazy" class="pickup__image" />
            </li>

            <li class="pickup__item">
              <img src="images/top/pickup-rug02.jpg" alt="グレーのヴィンテージラグ" width="700" height="700" loading="lazy" class="pickup__image" />
            </li>

            <li class="pickup__item">
              <img src="images/top/pickup-rug03.jpg" alt="ブラックのヴィンテージラグ" width="700" height="700" loading="lazy" class="pickup__image" />
            </li>

            <li class="pickup__item">
              <img src="images/top/pickup-rug04.jpg" alt="グリーンのフリンジラグ" width="700" height="700" loading="lazy" class="pickup__image" />
            </li>

            <li class="pickup__item">
              <img src="images/top/pickup-rug05.jpg" alt="アイボリーカラーのクッション" width="700" height="700" loading="lazy" class="pickup__image" />
            </li>

            <li class="pickup__item">
              <img src="images/top/pickup-rug06.jpg" alt="チェック柄のブランケット" width="700" height="700" loading="lazy" class="pickup__image" />
            </li>
          </ul>
        </div>
      </section>
    </main>
    <script src="js/swiper-bundle.min.js"></script>
    <script src="js/gsap.min.js"></script>
    <script src="js/SplitText.min.js"></script>
    <script src="js/ScrollTrigger.min.js"></script>
    <script src="js/main.js?v=1.0.7"></script>
  </body>
</html>
